<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Segoe UI, Inter, sans-serif">
  <rect width="980" height="560" fill="#0e1117"/>
  <text x="30" y="42" fill="#e6edf3" font-size="24" font-weight="700">Real-Time Financial Analytics Platform</text>
  <text x="30" y="66" fill="#8b949e" font-size="13">Snowpipe + Tasks · Snowpark medallion · Cortex AI · Streamlit — 100% inside Snowflake</text>

  <!-- Sources -->
  <rect x="30" y="100" width="200" height="70" rx="10" fill="#161b22" stroke="#21262d"/>
  <text x="45" y="128" fill="#2f81f7" font-size="13" font-weight="700">Yahoo Finance API</text>
  <text x="45" y="150" fill="#8b949e" font-size="11">live market data (no key)</text>

  <rect x="30" y="190" width="200" height="70" rx="10" fill="#161b22" stroke="#21262d"/>
  <text x="45" y="218" fill="#16c784" font-size="13" font-weight="700">Synthetic transactions</text>
  <text x="45" y="240" fill="#8b949e" font-size="11">Python (Faker) + news</text>

  <!-- Ingestion -->
  <rect x="280" y="100" width="190" height="160" rx="10" fill="#11151c" stroke="#2f81f7"/>
  <text x="295" y="124" fill="#e6edf3" font-size="13" font-weight="700">Ingestion</text>
  <text x="295" y="148" fill="#8b949e" font-size="11">Task + External Access</text>
  <text x="295" y="166" fill="#8b949e" font-size="11">(market, every 5 min)</text>
  <text x="295" y="196" fill="#8b949e" font-size="11">Snowpipe REST drip</text>
  <text x="295" y="214" fill="#8b949e" font-size="11">(transactions)</text>

  <!-- Medallion -->
  <rect x="520" y="90" width="190" height="200" rx="10" fill="#161b22" stroke="#21262d"/>
  <text x="535" y="114" fill="#e6edf3" font-size="13" font-weight="700">Medallion (Snowpark)</text>
  <rect x="535" y="128" width="160" height="40" rx="8" fill="#0e1117" stroke="#b08d57"/>
  <text x="545" y="153" fill="#b08d57" font-size="12">BRONZE · raw</text>
  <rect x="535" y="176" width="160" height="40" rx="8" fill="#0e1117" stroke="#9aa0a6"/>
  <text x="545" y="201" fill="#c8ccd0" font-size="12">SILVER · clean</text>
  <rect x="535" y="224" width="160" height="40" rx="8" fill="#0e1117" stroke="#f0c040"/>
  <text x="545" y="249" fill="#f0c040" font-size="12">GOLD · marts</text>

  <!-- AI -->
  <rect x="30" y="320" width="680" height="120" rx="10" fill="#11151c" stroke="#16c784"/>
  <text x="45" y="344" fill="#16c784" font-size="13" font-weight="700">Cortex AI layer</text>
  <text x="45" y="368" fill="#c8ccd0" font-size="11">ML.ANOMALY_DETECTION · ML.FORECAST · SENTIMENT / AI_CLASSIFY / SUMMARIZE</text>
  <text x="45" y="388" fill="#c8ccd0" font-size="11">AI_CLASSIFY fraud + COMPLETE reasons · EMBED_TEXT_768 + VECTOR cosine</text>
  <text x="45" y="408" fill="#c8ccd0" font-size="11">AI_AGG insights · Cortex Search (RAG) · Cortex Analyst (Text2SQL) · Cortex Agent</text>

  <!-- App -->
  <rect x="740" y="90" width="210" height="350" rx="10" fill="#161b22" stroke="#2f81f7"/>
  <text x="755" y="116" fill="#e6edf3" font-size="13" font-weight="700">🎈 Streamlit-in-Snowflake</text>
  <text x="755" y="146" fill="#8b949e" font-size="11">📈 Market · candlesticks</text>
  <text x="755" y="168" fill="#8b949e" font-size="11">💳 Spend · donut/heatmap</text>
  <text x="755" y="190" fill="#8b949e" font-size="11">🚨 Anomalies &amp; fraud</text>
  <text x="755" y="212" fill="#8b949e" font-size="11">🔮 Forecast bands</text>
  <text x="755" y="234" fill="#8b949e" font-size="11">📰 News &amp; sentiment</text>
  <text x="755" y="256" fill="#8b949e" font-size="11">🤖 AI Agent</text>
  <text x="755" y="278" fill="#8b949e" font-size="11">💬 Ask in English</text>
  <text x="755" y="300" fill="#8b949e" font-size="11">📋 Daily AI brief</text>

  <!-- arrows -->
  <g stroke="#3b434d" stroke-width="2" fill="none" marker-end="url(#a)">
    <path d="M230 135 H280"/>
    <path d="M230 225 H280"/>
    <path d="M470 180 H520"/>
    <path d="M630 290 V320"/>
    <path d="M710 190 H740"/>
  </g>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3b434d"/>
    </marker>
  </defs>
  <text x="30" y="500" fill="#8b949e" font-size="11">Trial-safe: XS warehouse, 60s auto-suspend. Tear down with sql/99_cleanup.sql.</text>
